<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 未来职业预测器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 42px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #667eea);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite, glowPulse 2s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glowPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 10px rgba(102, 126, 234, 0.5));
            }
            50% { 
                filter: drop-shadow(0 0 25px rgba(102, 126, 234, 0.8));
            }
        }

        .input-section {
            margin-bottom: 30px;
        }

        .name-input {
            width: 100%;
            padding: 18px 25px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .name-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .btn {
            padding: 18px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-predict:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 12, 41, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-crystal {
            font-size: 80px;
            animation: crystalSpin 1.5s ease-in-out infinite;
        }

        @keyframes crystalSpin {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.2); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        .loading-text {
            color: white;
            font-size: 24px;
            margin-top: 20px;
            animation: loadingPulse 1s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px dashed #e0e0e0;
            perspective: 1000px;
        }

        .result-section.show {
            display: block;
        }

        .result-card {
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateY(90deg);
        }

        .result-section.show .result-card {
            animation: flipIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes flipIn {
            0% { 
                transform: rotateY(90deg);
                opacity: 0;
            }
            100% { 
                transform: rotateY(0deg);
                opacity: 1;
            }
        }

        .career-emoji {
            font-size: 100px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .career-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .career-description {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 15px;
        }

        .btn-retry {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .btn-retry:active {
            transform: translateY(0);
        }

        .greeting {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }

        .stats-section {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .history-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px dashed #e0e0e0;
        }

        .history-section.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .history-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f5f7fa;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { 
                opacity: 0;
                transform: translateX(-20px);
            }
            to { 
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-emoji {
            font-size: 30px;
            margin-right: 15px;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        .history-desc {
            font-size: 12px;
            color: #888;
        }

        .history-time {
            font-size: 11px;
            color: #aaa;
        }

        .btn-toggle-history {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            margin-top: 20px;
        }

        .btn-toggle-history:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 239, 125, 0.4);
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-crystal">🔮</div>
        <div class="loading-text">正在通灵未来...</div>
    </div>

    <div class="container">
        <h1 class="title">🔮 未来职业预测器</h1>
        
        <div class="stats-section">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总预测次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="todayCount">0</div>
                <div class="stat-label">今日次数</div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" class="name-input" id="nameInput" placeholder="请输入你的名字...">
            <button class="btn btn-predict" id="predictBtn">✨ 开始预测</button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-card">
                <div class="greeting" id="greeting"></div>
                <div class="career-emoji" id="careerEmoji"></div>
                <div class="career-name" id="careerName"></div>
                <div class="career-description" id="careerDescription"></div>
                <button class="btn btn-retry" id="retryBtn">🔄 再测一次</button>
            </div>
        </div>

        <div class="history-section" id="historySection">
            <div class="history-title">📜 预测历史</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <button class="btn btn-toggle-history" id="toggleHistoryBtn">📜 查看历史记录</button>
    </div>

    <script>
        const careers = [
            {
                emoji: "👨‍🚀",
                name: "太空探险家",
                description: "你将在火星上建立第一个人类殖民地，每天和外星人喝茶聊天。记得带上足够的泡面，火星外卖不太方便哦！"
            },
            {
                emoji: "🤖",
                name: "AI 训练师",
                description: "你会教机器人学会讲笑话，让它们成为办公室里的开心果。小心别让它们学会了你的偷懒技巧！"
            },
            {
                emoji: "🦄",
                name: "独角兽饲养员",
                description: "在彩虹山谷里照顾一群会飞的独角兽，每天的工作就是给它们梳毛和喂彩虹糖。这是世界上最梦幻的工作！"
            },
            {
                emoji: "🎮",
                name: "职业游戏测试员",
                description: "每天的工作就是打游戏，还能提前体验最新游戏。不过要小心，可能会因为太沉迷而忘记下班！"
            },
            {
                emoji: "🍕",
                name: "披萨品尝大师",
                description: "你的味蕾将拯救世界，每天品尝各种口味的披萨。记得多运动，不然可能会变成一个圆圆的披萨！"
            },
            {
                emoji: "🎨",
                name: "梦境设计师",
                description: "专门为人们设计美梦，让他们每晚都能做最甜的梦。偶尔也会设计一些噩梦，用来提醒人们早起！"
            },
            {
                emoji: "🌊",
                name: "海底建筑师",
                description: "在深海建造水晶宫殿，和鱼儿们一起生活。记得带上防水手机，不然海底信号不太好！"
            },
            {
                emoji: "🎭",
                name: "表情包创作专家",
                description: "你的表情包将风靡全球，成为人们日常交流的必备工具。小心别把自己做成表情包哦！"
            },
            {
                emoji: "🌟",
                name: "星星收集者",
                description: "每天晚上收集掉落的星星，把它们做成许愿灯送给需要的人。这是世界上最浪漫的工作！"
            },
            {
                emoji: "🎪",
                name: "时间旅行导游",
                description: "带领游客穿越时空，见证历史大事。记得别让游客乱买东西，可能会改变历史哦！"
            },
            {
                emoji: "🎸",
                name: "宇宙音乐家",
                description: "你的音乐能让外星人感动流泪，成为银河系最红的明星。记得给地球人留几张演唱会门票！"
            },
            {
                emoji: "🌈",
                name: "彩虹画家",
                description: "专门在雨天画彩虹，给人们带来希望和快乐。你的作品会在雨后短暂出现，然后消失在云端。"
            }
        ];

        let history = JSON.parse(localStorage.getItem('careerHistory') || '[]');
        let totalCount = parseInt(localStorage.getItem('totalCount') || '0');
        let todayCount = parseInt(localStorage.getItem('todayCount') || '0');
        const today = new Date().toDateString();
        const savedDate = localStorage.getItem('lastDate');

        if (savedDate !== today) {
            todayCount = 0;
            localStorage.setItem('todayCount', '0');
            localStorage.setItem('lastDate', today);
        }

        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 3 + 1;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 3 + 2;
                const minOpacity = Math.random() * 0.3 + 0.2;

                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    --duration: ${duration}s;
                    --min-opacity: ${minOpacity};
                `;

                container.appendChild(star);
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('todayCount').textContent = todayCount;
        }

        function addToHistory(name, career) {
            const record = {
                name: name,
                emoji: career.emoji,
                careerName: career.name,
                description: career.description.substring(0, 30) + '...',
                time: new Date().toLocaleString()
            };
            
            history.unshift(record);
            if (history.length > 50) history.pop();
            
            localStorage.setItem('careerHistory', JSON.stringify(history));
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            history.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.style.animationDelay = `${index * 0.05}s`;
                div.innerHTML = `
                    <div class="history-emoji">${item.emoji}</div>
                    <div class="history-info">
                        <div class="history-name">${item.name} → ${item.careerName}</div>
                        <div class="history-desc">${item.description}</div>
                    </div>
                    <div class="history-time">${item.time}</div>
                `;
                historyList.appendChild(div);
            });
        }

        const nameInput = document.getElementById('nameInput');
        const predictBtn = document.getElementById('predictBtn');
        const resultSection = document.getElementById('resultSection');
        const careerEmoji = document.getElementById('careerEmoji');
        const careerName = document.getElementById('careerName');
        const careerDescription = document.getElementById('careerDescription');
        const retryBtn = document.getElementById('retryBtn');
        const greeting = document.getElementById('greeting');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const historySection = document.getElementById('historySection');
        const toggleHistoryBtn = document.getElementById('toggleHistoryBtn');

        function getRandomCareer() {
            const randomIndex = Math.floor(Math.random() * careers.length);
            return careers[randomIndex];
        }

        function showResult() {
            const name = nameInput.value.trim();
            if (!name) {
                alert('请先输入你的名字哦！');
                return;
            }

            loadingOverlay.classList.add('show');

            setTimeout(() => {
                const career = getRandomCareer();
                
                greeting.textContent = `${name}，你的未来职业是：`;
                careerEmoji.textContent = career.emoji;
                careerName.textContent = career.name;
                careerDescription.textContent = career.description;

                resultSection.classList.remove('show');
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('show');
                    resultSection.classList.add('show');

                    totalCount++;
                    todayCount++;
                    localStorage.setItem('totalCount', totalCount);
                    localStorage.setItem('todayCount', todayCount);
                    updateStats();

                    addToHistory(name, career);
                    renderHistory();
                }, 100);
            }, 2000);
        }

        function reset() {
            resultSection.classList.remove('show');
            nameInput.value = '';
            setTimeout(() => {
                nameInput.focus();
            }, 300);
        }

        function toggleHistory() {
            historySection.classList.toggle('show');
            toggleHistoryBtn.textContent = historySection.classList.contains('show') 
                ? '📜 隐藏历史记录' 
                : '📜 查看历史记录';
        }

        predictBtn.addEventListener('click', showResult);
        retryBtn.addEventListener('click', reset);
        toggleHistoryBtn.addEventListener('click', toggleHistory);

        nameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                showResult();
            }
        });

        createStars();
        updateStats();
        renderHistory();
    </script>
</body>
</html>
