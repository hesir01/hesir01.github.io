<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 超能力抽签机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float var(--duration) ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) translateX(0); 
                opacity: var(--min-opacity);
            }
            25% { 
                transform: translateY(-30px) translateX(10px); 
                opacity: 1;
            }
            50% { 
                transform: translateY(-15px) translateX(-10px); 
                opacity: 0.8;
            }
            75% { 
                transform: translateY(-40px) translateX(5px); 
                opacity: 1;
            }
        }

        .container {
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.95), rgba(20, 20, 40, 0.98));
            border-radius: 30px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.3), 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7, #00d4ff);
            border-radius: 32px;
            z-index: -1;
            opacity: 0.5;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .title {
            font-size: 42px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #f107a3, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-draw {
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 150, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-draw::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .btn-draw:hover::before {
            animation: shine 1s;
        }

        @keyframes shine {
            0% { left: -50%; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 150%; opacity: 0; }
        }

        .btn-draw:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 50px rgba(0, 150, 255, 0.6);
        }

        .btn-draw:active {
            transform: translateY(0) scale(0.98);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 30, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-sphere {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7, #f107a3);
            animation: sphereRotate 2s linear infinite, sphereGlow 1.5s ease-in-out infinite;
            position: relative;
        }

        .loading-sphere::before {
            content: '⚡';
            font-size: 60px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: iconPulse 0.5s ease-in-out infinite;
        }

        @keyframes sphereRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes sphereGlow {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(0, 150, 255, 0.5), 0 0 60px rgba(123, 47, 247, 0.3);
                filter: brightness(1);
            }
            50% { 
                box-shadow: 0 0 50px rgba(0, 150, 255, 0.8), 0 0 100px rgba(123, 47, 247, 0.6);
                filter: brightness(1.3);
            }
        }

        @keyframes iconPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        .loading-text {
            color: white;
            font-size: 24px;
            margin-top: 30px;
            animation: loadingPulse 0.8s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid rgba(100, 150, 255, 0.3);
            perspective: 1000px;
        }

        .result-section.show {
            display: block;
        }

        .result-card {
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateX(90deg);
            opacity: 0;
        }

        .result-section.show .result-card {
            animation: flipInX 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes flipInX {
            0% { 
                transform: rotateX(90deg) scale(0.5);
                opacity: 0;
            }
            60% {
                transform: rotateX(-10deg) scale(1.05);
                opacity: 0.8;
            }
            100% { 
                transform: rotateX(0deg) scale(1);
                opacity: 1;
            }
        }

        .power-emoji {
            font-size: 120px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(255, 200, 0, 0.8));
            animation: emojiGlow 2s ease-in-out infinite;
        }

        @keyframes emojiGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 200, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 200, 0, 1)); }
        }

        .power-name {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.8);
        }

        .power-level {
            font-size: 28px;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        .power-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.1), rgba(123, 47, 247, 0.1));
            border-radius: 15px;
            border: 1px solid rgba(100, 150, 255, 0.2);
        }

        .btn-retry {
            background: linear-gradient(135deg, #f107a3, #7b2ff7);
            color: white;
            padding: 18px 40px;
            font-size: 18px;
        }

        .btn-retry:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(241, 7, 163, 0.4);
        }

        .rarity {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .rarity.ssr {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .rarity.sr {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: #000;
        }

        .rarity.r {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-sphere"></div>
        <div class="loading-text">正在召唤超能力...</div>
    </div>

    <div class="container">
        <h1 class="title">⚡ 超能力抽签机</h1>

        <button class="btn-draw" id="drawBtn">🎲 抽取超能力！</button>

        <div class="result-section" id="resultSection">
            <div class="result-card">
                <div class="rarity" id="rarity">SSR</div>
                <div class="power-emoji" id="powerEmoji"></div>
                <div class="power-name" id="powerName"></div>
                <div class="power-level" id="powerLevel"></div>
                <div class="power-description" id="powerDescription"></div>
                <button class="btn btn-retry" id="retryBtn">🔄 再抽一次</button>
            </div>
        </div>
    </div>

    <script>
        const powers = [
            {
                emoji: "🔥",
                name: "火焰掌控",
                level: 5,
                rarity: "SSR",
                description: "你可以随意操控火焰，召唤火球、创造火墙。你的体温永远恒温，冬天不怕冷！缺点是洗澡的时候要小心..."
            },
            {
                emoji: "❄️",
                name: "冰霜之力",
                level: 5,
                rarity: "SSR",
                description: "你掌握了冰的魔法，可以冻结时间、创造冰雪世界。夏天空调钱全省了！但小心别把冰箱里的食物也冻坏了。"
            },
            {
                emoji: "⚡",
                name: "雷电支配",
                level: 5,
                rarity: "SSR",
                description: "你是雷电的主宰者，一举手就能召唤闪电。手机永远有电，再也不怕停电！就是打雷天要小心走在大街上..."
            },
            {
                emoji: "🛡️",
                name: "绝对防御",
                level: 4,
                rarity: "SR",
                description: "你拥有无敌的护盾，任何攻击都无法穿透。你可以保护你想要保护的人，简直就是超级英雄的标配！"
            },
            {
                emoji: "💨",
                name: "疾风使者",
                level: 4,
                rarity: "SR",
                description: "你能够操控风力，飞翔只是基本操作。跑步永远第一名，风扇和空调都可以退休了！"
            },
            {
                emoji: "🌊",
                name: "海洋之心",
                level: 4,
                rarity: "SR",
                description: "你可以与海洋生物沟通，在水下自由呼吸。海洋馆就是你的家，潜水证？不存在的！"
            },
            {
                emoji: "🗿",
                name: "大地之力",
                level: 4,
                rarity: "SR",
                description: "你能够操控大地，召唤石柱、引发地震。搬家只需要动动手指，挖掘机都失业了！"
            },
            {
                emoji: "👻",
                name: "幽灵形态",
                level: 3,
                rarity: "R",
                description: "你可以短暂进入幽灵状态，穿墙而过。迟到时直接从墙里进去，老板都看不见你！就是容易吓到人..."
            },
            {
                emoji: "👁️",
                name: "透视之眼",
                level: 3,
                rarity: "R",
                description: "你的眼睛可以看穿一切本质，透视只是小case。但是要慎用，不然世界会变得很无趣..."
            },
            {
                emoji: "⏰",
                name: "时间暂停",
                level: 5,
                rarity: "SSR",
                description: "你可以暂停时间！在迟到、赶作业、抢限量时堪称神器。但是暂停太久小心回不去！"
            },
            {
                emoji: "🔮",
                name: "预知未来",
                level: 4,
                rarity: "SR",
                description: "你能够预见未来的片段，买彩票或许能中奖！但是知道太多未来会很烦恼，活在当下最重要~"
            },
            {
                emoji: "💫",
                name: "重力反转",
                level: 3,
                rarity: "R",
                description: "你可以随意改变重力方向，走在天花板上都不是梦。跳舞的时候绝对是最炫的！"
            },
            {
                emoji: "🧠",
                name: "心灵感应",
                level: 3,
                rarity: "R",
                description: "你可以读取他人的想法，撒谎在你面前无所遁形。但是知道了太多秘密也是很累的..."
            },
            {
                emoji: "🦋",
                name: "变形术",
                level: 4,
                rarity: "SR",
                description: "你可以变成任何物体的样子。逃课神器可能就是你了！但是记得变回来，不然就回不去了~"
            }
        ];

        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 80;
            const colors = ['#00d4ff', '#7b2ff7', '#f107a3', '#ffd700'];

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 6 + 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 10 + 5;
                const minOpacity = Math.random() * 0.3 + 0.1;
                const color = colors[Math.floor(Math.random() * colors.length)];

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    background: ${color};
                    box-shadow: 0 0 ${size * 2}px ${color};
                    --duration: ${duration}s;
                    --min-opacity: ${minOpacity};
                `;

                container.appendChild(particle);
            }
        }

        function getRandomPower() {
            const randomIndex = Math.floor(Math.random() * powers.length);
            return powers[randomIndex];
        }

        function getStars(level) {
            return '⭐'.repeat(level) + '☆'.repeat(5 - level);
        }

        const drawBtn = document.getElementById('drawBtn');
        const resultSection = document.getElementById('resultSection');
        const powerEmoji = document.getElementById('powerEmoji');
        const powerName = document.getElementById('powerName');
        const powerLevel = document.getElementById('powerLevel');
        const powerDescription = document.getElementById('powerDescription');
        const retryBtn = document.getElementById('retryBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const rarityEl = document.getElementById('rarity');

        function drawPower() {
            loadingOverlay.classList.add('show');

            setTimeout(() => {
                const power = getRandomPower();
                
                rarityEl.textContent = power.rarity;
                rarityEl.className = 'rarity ' + power.rarity.toLowerCase();
                powerEmoji.textContent = power.emoji;
                powerName.textContent = power.name;
                powerLevel.textContent = getStars(power.level);
                powerDescription.textContent = power.description;

                resultSection.classList.remove('show');
                
                setTimeout(() => {
                    loadingOverlay.classList.remove('show');
                    resultSection.classList.add('show');
                }, 100);
            }, 2500);
        }

        function reset() {
            resultSection.classList.remove('show');
        }

        drawBtn.addEventListener('click', drawPower);
        retryBtn.addEventListener('click', drawPower);

        createParticles();
    </script>
</body>
</html>
